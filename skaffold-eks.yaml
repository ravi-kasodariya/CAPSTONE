apiVersion: skaffold/v4beta13
kind: Config

build:
  tagPolicy:
    sha256: {}

  platforms:
    - linux/amd64
    
  artifacts:
  
  - image: 951472954050.dkr.ecr.eu-west-2.amazonaws.com/ai-orchestration
    context: ai-orchestration
    docker:
      dockerfile: dockerfile


  - image: 951472954050.dkr.ecr.eu-west-2.amazonaws.com/auth
    context: auth
    docker:
      dockerfile: dockerfile

  
  - image: 951472954050.dkr.ecr.eu-west-2.amazonaws.com/notification
    context: notification
    docker:
      dockerfile: dockerfile
        

  - image: 951472954050.dkr.ecr.eu-west-2.amazonaws.com/agent
    context: sandbox/agent
    docker:
      dockerfile: dockerfile
  
  - image: 951472954050.dkr.ecr.eu-west-2.amazonaws.com/sync-agent
    context: sandbox/sync-agent
    docker:
      dockerfile: dockerfile

  - image: 951472954050.dkr.ecr.eu-west-2.amazonaws.com/router
    context: sandbox/router
    docker:
      dockerfile: dockerfile

  - image: 951472954050.dkr.ecr.eu-west-2.amazonaws.com/sandbox
    context: sandbox/server
    docker:
      dockerfile: dockerfile

  - image: 951472954050.dkr.ecr.eu-west-2.amazonaws.com/template
    context: sandbox/template
    docker:
      dockerfile: dockerfile

manifests:
  rawYaml:
    - k8s/ai-deployment.yml
    - k8s/ai-service.yml
    - k8s/auth-deployment.yml
    - k8s/auth-service.yml
    - k8s/sandbox-deployment.yml
    - k8s/sandbox-service.yml
    - k8s/ingress.yml
    - k8s/router-deployment.yml
    - k8s/router-service.yml
    - k8s/rbac.yml
    - k8s/secrets.yml
    - k8s/notification-deployment.yml
    - k8s/notification-service.yml